<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 PAINEL VENDAS REALTIME</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#020617;
  color:#e5f0ff;
}

header{
  padding:20px;
  background:#020617;
  border-bottom:1px solid #0f172a;
  display:flex;
  justify-content:space-between;
  font-weight:800;
}

.controls{
  padding:15px;
  display:flex;
  gap:10px;
}

input,button{
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#06b6d4;
  color:#000;
  font-weight:800;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#0e172d;
  border-radius:14px;
  padding:18px;
}

.empresa{
  font-size:13px;
  color:#94a3b8;
  font-weight:700;
}

.valor{
  font-size:32px;
  font-weight:800;
  color:#22c55e;
}

.item{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:5px;
}
</style>
</head>

<body>

<header>
  <div>🔥 PAINEL DV REALTIME</div>
  <div id="status"></div>
</header>

<div class="controls">
  <input type="datetime-local" id="inicio">
  <input type="datetime-local" id="fim">
  <button onclick="reload()">Atualizar</button>
</div>

<div id="grid" class="grid"></div>
<canvas id="grafico"></canvas>

<script>

// ================= SUPABASE =================
const sb = window.supabase.createClient(
  "https://ehxrrpsiksceljmhsfxk.supabase.co",
  "sb_publishable_Jm2ZQKzPS3gNPCKSjFAmYQ_WNMYwF1j"
)

// ================= FORMAT =================
const brl = v => Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})

// ================= TURNO =================
function turno(){
  const now = new Date()
  const inicio = new Date(now)
  inicio.setHours(5,0,0,0)

  const fim = new Date(inicio)
  fim.setDate(fim.getDate()+1)
  fim.setHours(4,0,0,0)

  return {inicio,fim}
}

// ================= JSON SEGURO =================
function lerJSON(raw){
  try{
    if(typeof raw === "object") return raw
    let p = JSON.parse(raw)
    if(typeof p === "string") p = JSON.parse(p)
    return p
  }catch{
    return null
  }
}

// ================= PARSE =================
function parse(v){

  const raw = lerJSON(v.raw)
  if(!raw) return null

  // 🔥 DATA CORRETA DO CUPOM
  let dataHora = raw.dataHoraFechamentoCupom

  if(!dataHora && raw.data && raw.hora){
    const h = raw.hora.padStart(4,"0")
    dataHora = `${raw.data}T${h.slice(0,2)}:${h.slice(2,4)}:00`
  }

  const data = new Date((dataHora || raw.data).replace("Z",""))

  return {
    data,
    finais: raw.finalizacoes || [],
    cancelado: raw.cancelada === true
  }
}

// ================= PROCESS =================
function process(lista, inicio, fim){

  const res = {}
  const seen = new Set()

  lista.forEach(v=>{

    // 🔥 ID ÚNICO DO CUPOM
    const raw = lerJSON(v.raw)
    if(!raw) return

    const id = raw.id || raw.idExterno
    if(!id) return

    if(seen.has(id)) return
    seen.add(id)

    const p = parse(v)
    if(!p || !p.data) return

    if(p.data < inicio || p.data > fim) return

    const emp = v.empresa_id || "SEM_EMPRESA"

    if(!res[emp]){
      res[emp]={
        total:0,
        vendas:0,
        cancelados:0,
        finais:{}
      }
    }

    // 🔴 CANCELADO
    if(p.cancelado){
      res[emp].cancelados++
      return
    }

    let totalCupom = 0
    let tevePagamento = false

    // 🔥 USA SOMENTE FINALIZACOES DO RAW
    p.finais.forEach(f=>{

      const bruto = Number(f.valor || 0)
      const troco = Number(f.troco || 0)

      const liquido = bruto - troco

      if(liquido <= 0) return

      tevePagamento = true
      totalCupom += liquido

      const idf = Number(f.finalizadoraId || 0)
      const nome = "FINALIZADORA " + idf

      res[emp].finais[nome] =
        (res[emp].finais[nome] || 0) + liquido
    })

    // 🔥 IGUAL AO VAREJO → se não teve pagamento, ignora
    if(!tevePagamento) return

    res[emp].total += totalCupom
    res[emp].vendas++
  })

  return res
}

// ================= RENDER =================
function render(d){

  const grid = document.getElementById("grid")
  grid.innerHTML=""

  Object.keys(d).forEach(emp=>{

    const x = d[emp]

    grid.innerHTML += `
      <div class="card">
        <div class="empresa">${emp}</div>
        <div class="valor">${brl(x.total)}</div>
        <div>${x.vendas} vendas</div>
        <div style="color:red">${x.cancelados} cancelados</div>

        ${
          Object.entries(x.finais)
          .sort((a,b)=>b[1]-a[1])
          .map(f=>`<div class="item">${f[0]} <b>${brl(f[1])}</b></div>`)
          .join("")
        }
      </div>
    `
  })

  renderChart(d)
}

// ================= GRAFICO =================
let chart
function renderChart(d){

  const labels = Object.keys(d)
  const values = labels.map(e=>d[e].total)

  if(chart) chart.destroy()

  chart = new Chart(grafico,{
    type:"bar",
    data:{
      labels,
      datasets:[{label:"Faturamento",data:values}]
    }
  })
}

// ================= LOAD =================
async function load(inicio, fim){

  let all = []
  let from = 0
  const step = 500

  const inicioISO = inicio.toISOString().slice(0,10)
  const fimISO = fim.toISOString().slice(0,10)

  while(true){

    const { data } = await sb
      .from("cupons_importados")
      .select("*")
      .gte("data", inicioISO)
      .lte("data", fimISO)
      .range(from, from + step - 1)

    if(!data || data.length === 0) break

    all = all.concat(data)

    if(data.length < step) break
    from += step
  }

  console.log("📊 TOTAL:", all.length)

  const dados = process(all, inicio, fim)

  render(dados)

  document.getElementById("status").innerText =
    "Atualizado " + new Date().toLocaleTimeString()
}

// ================= RELOAD =================
function reload(){
  const i = new Date(document.getElementById("inicio").value)
  const f = new Date(document.getElementById("fim").value)
  load(i,f)
}

// ================= START =================
const t = turno()

function formatLocal(date){
  const pad=n=>String(n).padStart(2,"0")
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`
}

inicio.value = formatLocal(t.inicio)
fim.value = formatLocal(t.fim)

load(t.inicio,t.fim)

// ================= REALTIME =================
sb.channel("realtime_vendas")
.on("postgres_changes",{
  event:"INSERT",
  schema:"public",
  table:"cupons_importados"
}, async ()=>{

  console.log("⚡ NOVA VENDA")
  const t = turno()
  await load(t.inicio, t.fim)

})
.subscribe(s=>console.log("📡 REALTIME:",s))

</script>

</body>
</html>
