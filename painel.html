// ================= TRANSFORMA MAPA =================
const MAPA = {}

Object.keys(MAPA_ORIGINAL).forEach(emp=>{
  MAPA[emp] = {}
  MAPA_ORIGINAL[emp].forEach(f=>{
    MAPA[emp][Number(f.id)] = f.descricao
  })
})

// ================= FORMAT =================
const brl = v => Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})

// ================= TURNO =================
function turno(){
  const now = new Date()

  const inicio = new Date(now)
  inicio.setHours(5,0,0,0)

  const fim = new Date(inicio)
  fim.setDate(fim.getDate()+1)
  fim.setHours(4,0,0,0)

  return {inicio,fim}
}

// ================= PARSE =================
function parse(v){
  const raw = lerJSONSeguro(v.raw)
  if(!raw) return null

  let dataHora = raw?.dataHoraFechamentoCupom

  if(!dataHora && raw?.data && raw?.hora){
    const h = raw.hora.padStart(4,"0")
    dataHora = `${raw.data}T${h.slice(0,2)}:${h.slice(2,4)}:00`
  }

  if(!dataHora && raw?.data){
    dataHora = raw.data + "T00:00:00"
  }

  // 🔥 CORREÇÃO DEFINITIVA
  const dataCorrigida = new Date(dataHora.replace("Z",""))

  return {
    data: dataCorrigida,
    finais: raw?.finalizacoes || [],
    cancelado: raw?.cancelada || raw?.cancelado || false
  }
}
// ================= PROCESS =================
function process(data, inicio, fim){

  const result = {}
  const seen = new Set() // 🔥 CONTROLE DE DUPLICADOS

  data.forEach(v=>{

const raw = lerJSONSeguro(v.raw)

if(!raw) return null

const id = v.venda_id || raw?.id || raw?.idExterno || Math.random()    // 🔥 BLOQUEIO DE DUPLICADOS
    if(!id) return
    if(seen.has(id)) return
    seen.add(id)

const p = parse(v)
if(!p || !p.data) return

const d = v.__dataCorrigida || new Date(p.data)

    
    if(d < inicio || d > fim) return

    const emp = v.empresa_id

    if(!result[emp]){
      result[emp]={
        total:0,
        vendas:0,
        cancelados:0,
        valorCancelado:0,
        finais:{}
      }
    }

    // 🔴 CANCELADOS
    if(p.cancelado){
      result[emp].cancelados++
      result[emp].valorCancelado += p.valor
      return
    }

    // ✅ VÁLIDOS
let totalCupom = 0
let tevePagamento = false

p.finais.forEach(f=>{

  const bruto = Number(f.valor || 0)
  const troco = Number(f.troco || 0)
  const valor = bruto - troco

  // 🔥 ignora lixo
  if(valor <= 0) return

  tevePagamento = true
  totalCupom += valor

  const idf = Number(f.finalizadoraId)
  const nome = MAPA[emp]?.[idf] || "OUTROS"

  result[emp].finais[nome] =
    (result[emp].finais[nome] || 0) + valor
})

// 🔥 IGUAL AO VAREJO
if(!tevePagamento) return

result[emp].total += totalCupom
result[emp].vendas++

  })

  return result
}
// ================= RENDER =================
function render(dados){

  const grid = document.getElementById("grid")
  grid.innerHTML=""

  Object.keys(dados).forEach(emp=>{

    const d = dados[emp]

    grid.innerHTML += `
      <div class="card">
        <div class="empresa">${emp}</div>
        <div class="valor">${brl(d.total)}</div>
<div>${d.vendas} vendas</div>
<div style="color:red;font-size:12px">
  ❌ ${d.cancelados} cancelados (${brl(d.valorCancelado)})
</div>
        ${
          Object.entries(d.finais)
          .sort((a,b)=>b[1]-a[1])
          .map(f=>`<div class="item">${f[0]} <b>${brl(f[1])}</b></div>`)
          .join("")
        }
      </div>
    `
  })

  renderChart(dados)
}

// ================= GRAFICO =================
let chart
function renderChart(d){

  const labels = Object.keys(d)
  const values = labels.map(e=>d[e].total)

  if(chart) chart.destroy()

  chart = new Chart(grafico,{
    type:"bar",
    data:{
      labels,
      datasets:[{
        label:"Faturamento",
        data:values
      }]
    }
  })
}

// ================= LOAD =================
async function load(inicio, fim){

  let all = []
  let from = 0
  const step = 300

  // 🔥 CONVERTE PARA YYYY-MM-DD (CORRETO PRO SUPABASE)
  function toDateOnly(date){
    const d = new Date(date)
    return d.getFullYear() + "-" +
      String(d.getMonth()+1).padStart(2,"0") + "-" +
      String(d.getDate()).padStart(2,"0")
  }

  const inicioISO = toDateOnly(inicio)
  const fimISO = toDateOnly(fim)

  console.log("📅 FILTRO BANCO:", inicioISO, "→", fimISO)

  // ================= PAGINAÇÃO =================
  while(true){

    const { data, error } = await sb
      .from("cupons_importados")
      .select("empresa_id,data,raw")
      .gte("data", inicioISO)
      .lte("data", fimISO)
      .range(from, from + step - 1)

    if(error){
      console.error("❌ ERRO SUPABASE:", error)
      break
    }

    if(!data || data.length === 0) break

    all = all.concat(data)

    if(data.length < step) break

    from += step
  }

  console.log("📊 TOTAL CARREGADO:", all.length)

  // ================= PROCESS =================

  function parseLocal(dateStr){
    // 🔥 REMOVE UTC BUG
    return new Date(dateStr.replace("Z",""))
  }

  const dados = process(
    all.map(v=>{
      const raw = lerJSONSeguro(v.raw)

      if(!raw) return null

      let dataHora = raw?.dataHoraFechamentoCupom

      if(!dataHora && raw?.data && raw?.hora){
        const h = raw.hora.padStart(4,"0")
        dataHora = `${raw.data}T${h.slice(0,2)}:${h.slice(2,4)}:00`
      }

      if(!dataHora && raw?.data){
        dataHora = raw.data + "T00:00:00"
      }

      return {
        ...v,
        __dataCorrigida: parseLocal(dataHora)
      }

    }).filter(Boolean),

    inicio,
    fim
  )

  render(dados)

  document.getElementById("status").innerText =
    "Atualizado " + new Date().toLocaleTimeString()

  document.getElementById("periodo").innerText =
    `Período: ${inicio.toLocaleString()} → ${fim.toLocaleString()}`
}

// ================= RELOAD =================
function reload(){

  const inicio = new Date(document.getElementById("inicio").value)
  const fim = new Date(document.getElementById("fim").value)

  load(inicio,fim)
}

function formatLocal(date){
  const pad = n => String(n).padStart(2,"0")

  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`
}

document.getElementById("inicio").value = formatLocal(t.inicio)
document.getElementById("fim").value = formatLocal(t.fim)

// ================= TEMPO REAL VIA API =================

async function buscarTempoReal(){

  const hoje = new Date()

  function toDateOnly(date){
    return date.getFullYear() + "-" +
      String(date.getMonth()+1).padStart(2,"0") + "-" +
      String(date.getDate()).padStart(2,"0")
  }

  const empresas = [
    "VAREJO_URL_MERCATTO",

    "VAREJO_URL_PADARIA",
    "VAREJO_URL_DELICIA"
  ]

  let all = []

  for(const emp of empresas){

    try{

// 🔥 PEGA TOKEN AUTOMATICAMENTE
const login = await fetch("/api/login",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body: JSON.stringify({ empresa: emp })
})

const loginJson = await login.json()
const token = loginJson.accessToken || loginJson.token

// 🔥 AGORA SIM FUNCIONA
const resp = await fetch("/api/recebimentos",{
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body: JSON.stringify({
    token, // 🔥 ESSA LINHA RESOLVE
    empresa: emp,
    dataInicio: toDateOnly(hoje),
    dataFim: toDateOnly(hoje)
  })
})





      

      const json = await resp.json()

      const items = (json.items || []).map(v=>({
        raw: v,
        empresa_id: emp
      }))

      all = all.concat(items)

    }catch(e){
      console.log("❌ ERRO TEMPO REAL:", emp, e.message)
    }
  }

  return all
}



  setInterval(async ()=>{

  console.log("🔄 TEMPO REAL...")

  const novos = await buscarTempoReal()

  const dados = process(novos, t.inicio, t.fim)

  render(dados)

}, 5000) // 5 segundos






  
function lerJSONSeguro(raw){

  try{

    // já é objeto → retorna direto
    if(typeof raw === "object"){
      return raw
    }

    // não é string → inválido
    if(typeof raw !== "string"){
      return null
    }

    // 1º parse
    let parsed = JSON.parse(raw)

    // se ainda for string → parse de novo
    if(typeof parsed === "string"){
      parsed = JSON.parse(parsed)
    }

    return parsed

  }catch(e){
    console.log("❌ ERRO AO LER JSON:", e.message)
    console.log("📦 RAW PROBLEMÁTICO:", raw)
    return null
  }
}
