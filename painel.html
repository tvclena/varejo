
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Vendas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#060b1a;color:#fff;font-family:Arial}
.card{padding:10px;border-bottom:1px solid #333}
</style>
</head>
<body>

<h2>🔥 Vendas em Tempo Real</h2>
<div id="vendas"></div>

<script>
const supabase = window.supabase.createClient(
  "https://ehxrrpsiksceljmhsfxk.supabase.co",
  "sb_publishable_Jm2ZQKzPS3gNPCKSjFAmYQ_WNMYwF1j"
);

const container = document.getElementById("vendas");

function render(v){
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `
    🧾 ${v.venda_id}<br>
    💰 R$ ${Number(v.valor).toFixed(2)}<br>
    💳 Finalizadora: ${v.finalizadora_principal}
  `;
  container.prepend(el);
}

async function load(){
  const { data } = await supabase
    .from("vendas_realtime")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(50);

  data.forEach(render);
}

supabase
  .channel("vendas")
  .on("postgres_changes", {
    event: "INSERT",
    schema: "public",
    table: "vendas_realtime"
  }, payload => {
    render(payload.new);
  })
  .subscribe();

setInterval(()=>{
  fetch("/api/sync-vendas",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({empresa:"VAREJO_URL_MERCATTO"})
  });
},10000);

load();
</script>

</body>
</html>
